<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DN Memorandum</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        th { background: #d3d3d3; }
        input, select { padding: 5px; border: 1px solid #ccc; }
        .btn { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 6px; }
        .btn-upload { background: #ff9500; }
        .btn-select { background: #28a745; }
        .btn-back { background: #666; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; overflow: auto; }
        .modal-overlay.active { display: block; }
        .modal-content { background: white; margin: 20px auto; max-width: 900px; max-height: 85vh; overflow: auto; border-radius: 8px; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        .modal-close { cursor: pointer; font-size: 24px; color: #666; }
        .modal-search { padding: 8px; width: 250px; font-size: 14px; }
        
        .shape-grid { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
        .shape-btn { 
            padding: 20px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); transition: transform 0.2s;
        }
        .shape-btn:hover { transform: translateY(-2px); }
        .shape-btn .count { display: block; font-size: 12px; opacity: 0.9; margin-top: 5px; }
        .shape-btn .selected-badge { 
            display: none; background: #28a745; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 8px; 
        }
        .shape-btn.has-selection .selected-badge { display: inline; }
        
        .stock-item { display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 4px; cursor: pointer; }
        .stock-item:hover { background: #f0f8ff; }
        .stock-item.selected { background: #e6f7ff; border-color: #007bff; }
        .stock-item input[type="checkbox"] { margin-right: 10px; }
        .stock-item-info { flex: 1; }
        .stock-item-info div { margin: 2px 0; }
        .stock-label { font-size: 11px; color: #666; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        
        .step-indicator { display: flex; align-items: center; margin-bottom: 20px; }
        .step { padding: 8px 16px; background: #e0e0e0; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .step.active { background: #007bff; color: white; }
        .step-arrow { margin: 0 10px; color: #999; }
        
        .item-count { font-size: 14px; color: #666; margin-bottom: 10px; }
        
        .selected-summary { background: #f0f0f0; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .selected-summary div { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DN MEMORANDUM</h1>
        <div style="margin-bottom:15px;">
            <button class="btn btn-upload" onclick="document.getElementById('excelInput').click()">Import Stock List</button>
            <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="loadStockExcel(this)">
            <button class="btn btn-select" onclick="openShapeSelectModal()">Select Items</button>
        </div>
        
        <table id="itemsTable">
            <thead>
                <tr>
                    <th>No</th><th>Parcel</th><th>Shape</th><th>Carat</th><th>Color</th><th>Clarity</th><th>Cert</th><th>Price/Ct</th><th>Disc%</th><th>Amount</th><th></th>
                </tr>
            </thead>
            <tbody id="itemsBody">
            </tbody>
        </table>
        <button type="button" onclick="addRow()">+ Add Row</button> <button type="button" onclick="clearAllRows()" style="padding:10px 20px;background:#ff3b30;color:white;border:none;cursor:pointer;border-radius:6px;">Clear All</button>
        <div style="margin-top:15px;">
            Total Carat: <input id="totalCarat" readonly size="10">
            Total Amount: <input id="totalAmount" readonly size="10">
        </div>
        <br>
        <button type="button" class="btn" onclick="downloadPDF()">Download PDF</button>
    </div>

    <!-- Shape Selection Modal -->
    <div class="modal-overlay" id="shapeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Select Shape</h2>
                <span class="modal-close" onclick="closeShapeModal()">x</span>
            </div>
            <div class="step-indicator">
                <span class="step active">1. Select Shape</span>
                <span class="step-arrow">→</span>
                <span class="step">2. Select Items</span>
            </div>
            
            <div class="selected-summary" id="selectedSummary" style="display:none;">
                <b>Selected: </b><span id="selectedCount">0</span> items
                <div id="shapeSelections"></div>
            </div>
            
            <p>Choose shapes to select items:</p>
            <div class="shape-grid" id="shapeGrid"></div>
            
            <div style="margin-top:20px; text-align:right;">
                <button class="btn" onclick="submitAllSelections()">Add All Selected Items</button>
            </div>
        </div>
    </div>

    <!-- Items Selection Modal -->
    <div class="modal-overlay" id="itemsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="itemsModalTitle">Select Items</h2>
                <span class="modal-close" onclick="closeItemsModal()">x</span>
            </div>
            <div class="step-indicator">
                <span class="step active" onclick="backToShapes()">1. Select Shape</span>
                <span class="step-arrow">→</span>
                <span class="step active">2. Select Items</span>
            </div>
            
            <div class="action-bar">
                <input type="text" class="modal-search" id="stockSearch" placeholder="Search..." oninput="filterStockItems()">
                <div>
                    <button class="btn btn-back" onclick="backToShapes()">Back</button> <button class="btn" onclick="confirmShapeSelection()">Submit</button>
                    <button class="btn" style="background:#666" onclick="selectAll()">Select All</button>
                    <button class="btn" style="background:#666" onclick="deselectAll()">Deselect All</button>
                </div>
            </div>
            
            <div class="item-count" id="itemCount"></div>
            <div id="stockList"></div>
        </div>
    </div>

    var excelShapes = [];
    var tempSelections = {};  // Store selections by shape
    var allSelections = [];   // All selected items
    
    function getRange(carat) {
        carat = parseFloat(carat);
        if(carat < 1) return ".90-.99";
        if(carat < 1.5) return "1.00-1.49";
        if(carat < 2) return "1.50-1.99";
        if(carat < 3) return "2.00-2.99";
        if(carat < 4) return "3.00-3.99";
        if(carat < 5) return "4.00-4.99";
        return "5.00-5.99";
    }
    
    function lookup(shape, carat, color, clarity) {
        var tableKey = (shape == "RBC") ? "round" : "pear";
        var range = getRange(carat);
        var table = RAPAPORT[tableKey];
        if(!table || !table[range] || !table[range][color] || !table[range][color][clarity]) return null;
        return table[range][color][clarity];
    }
    
    function calculate(n) {
        var shape = document.getElementById("shape"+n).value;
        var carat = parseFloat(document.getElementById("carat"+n).value) || 0;
        var color = document.getElementById("color"+n).value.toUpperCase();
        var clarity = document.getElementById("clarity"+n).value.toUpperCase();
        if(clarity == "FL") clarity = "IF";
        var discount = parseFloat(document.getElementById("disc"+n).value) || 0;
        if(!carat || !color || !clarity) return;
        
        var rap = lookup(shape, carat, color, clarity);
        if(rap) {
            var pricePerCarat = rap * 100;
            var total = pricePerCarat * carat * (1 + discount/100);
            document.getElementById("price"+n).value = pricePerCarat.toFixed(2);
            document.getElementById("amount"+n).value = total.toFixed(2);
        }
        calcTotals();
    }
    
    function calcTotals() {
        var tc = 0, ta = 0;
        for(var i=1; i<=10; i++) {
            var c = document.getElementById("carat"+i);
            var a = document.getElementById("amount"+i);
            if(c && c.value) tc += parseFloat(c.value) || 0;
            if(a && a.value) ta += parseFloat(a.value) || 0;
        }
        document.getElementById("totalCarat").value = tc.toFixed(2);
        document.getElementById("totalAmount").value = ta.toFixed(2);
    }
    
    
    function clearRow(n) {
        var parcel = document.getElementById('parcel'+n).value;
        var carat = document.getElementById('carat'+n).value;
        
        // Remove from tempSelections if exists
        for(var shape in tempSelections) {
            tempSelections[shape] = tempSelections[shape].filter(function(item) {
                return !(item.parcel === parcel && item.carat === carat);
            });
        }
        
        document.getElementById('parcel'+n).value = '';
        document.getElementById('shape'+n).value = '';
        document.getElementById('carat'+n).value = '';
        document.getElementById('color'+n).value = '';
        document.getElementById('clarity'+n).value = '';
        document.getElementById('cert'+n).value = '';
        document.getElementById('price'+n).value = '';
        document.getElementById('disc'+n).value = '0';
        document.getElementById('amount'+n).value = '';
        calcTotals();
    }
    
    function clearAllRows() {
        if(!confirm('Clear all items?')) return;
        document.getElementById('itemsBody').innerHTML = '';
        addRow();
        calcTotals();
    }
    
function addRow() {
        var tbody = document.getElementById("itemsBody");
        var n = tbody.rows.length + 1;
        if(n > 10) return;
        var tr = document.createElement("tr");
        tr.innerHTML = '<td>'+n+'</td><td><input id="parcel'+n+'" size="10"></td><td><input id="shape'+n+'" size="6" onchange="calculate('+n+')"></td><td><input id="carat'+n+'" size="5" onchange="calculate('+n+')"></td><td><input id="color'+n+'" size="4" onchange="calculate('+n+')"></td><td><select id="clarity'+n+'" onchange="calculate('+n+')"><option value="">-</option><option value="FL">FL</option><option value="IF">IF</option><option value="VVS1">VVS1</option><option value="VVS2">VVS2</option><option value="VS1">VS1</option><option value="VS2">VS2</option><option value="SI1">SI1</option><option value="SI2">SI2</option></select></td><td><input id="cert'+n+'" size="8"></td><td><input id="price'+n+'" size="7" readonly></td><td><input id="disc'+n+'" size="4" value="0" onchange="calculate('+n+')"></td><td><input id="amount'+n+'" size="8" readonly></td><td><button onclick="clearRow('+n+')" style="padding:4px 8px;background:#ff3b30;color:white;border:none;border-radius:4px;cursor:pointer;">X</button></td>';
        tbody.appendChild(tr);
    }
    
    function loadStockExcel(input) {
        var file = input.files[0];
        if(!file) return;
        
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = new Uint8Array(e.target.result);
                var workbook = XLSX.read(data, {type: 'array'});
                var sheet = workbook.Sheets[workbook.SheetNames[0]];
                var jsonData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                
                var headerIdx = 0;
                for(var h=0; h<Math.min(5, jsonData.length); h++) {
                    var row = jsonData[h];
                    if(row && row.length > 0) {
                        for(var c=0; c<row.length; c++) {
                            var v = String(row[c] || "").toLowerCase();
                            if(v.indexOf("parcel") >= 0 || v.indexOf("carat") >= 0) { headerIdx = h; break; }
                        }
                    }
                }
                
                var headers = jsonData[headerIdx] || [];
                var colMap = {parcel:-1, shape:-1, carat:-1, color:-1, clarity:-1, cert:-1};
                for(var c=0; c<headers.length; c++) {
                    var h = String(headers[c] || "").toLowerCase();
                    if(h.indexOf("parcel") >= 0 || h.indexOf("name") >= 0) colMap.parcel = c;
                    else if(h.indexOf("shape") >= 0) colMap.shape = c;
                    else if(h.indexOf("carat") >= 0 || h.indexOf("crt") >= 0) colMap.carat = c;
                    else if(h.indexOf("color") >= 0) colMap.color = c;
                    else if(h.indexOf("clarit") >= 0) colMap.clarity = c;
                    else if(h.indexOf("cert") >= 0 || h.indexOf("gia") >= 0) colMap.cert = c;
                }
                
                stockData = [];
                excelShapes = [];
                var shapeCounts = {};
                
                for(var r=headerIdx+1; r<jsonData.length; r++) {
                    var row = jsonData[r];
                    if(!row || row.length === 0) continue;
                    
                    var getVal = function(idx) { if(idx < 0) return ""; var v = row[idx]; return v ? String(v).trim() : ""; };
                    
                    var shape = getVal(colMap.shape);
                    if(!shape) shape = "RBC";
                    if(shape.toUpperCase().indexOf("ROUND") >= 0 || shape.toUpperCase() == "RBC") shape = "RBC";
                    else if(shape.toUpperCase().indexOf("PEAR") >= 0 || shape.toUpperCase().indexOf("DROP") >= 0) shape = "Pear";
                    
                    var item = { parcel: getVal(colMap.parcel), shape: shape, carat: getVal(colMap.carat), color: getVal(colMap.color), clarity: getVal(colMap.clarity), cert: getVal(colMap.cert) };
                    
                    if(item.parcel || item.carat) {
                        stockData.push(item);
                        shapeCounts[shape] = (shapeCounts[shape] || 0) + 1;
                    }
                }
                
                excelShapes = Object.keys(shapeCounts).sort();
                tempSelections = {};
                allSelections = [];
                
                renderShapeGrid(shapeCounts);
                alert("Loaded " + stockData.length + " items!");
            } catch(err) { alert("Error: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }
    
    function renderShapeGrid(shapeCounts) {
        var grid = document.getElementById('shapeGrid');
        grid.innerHTML = '';
        
        excelShapes.forEach(function(shape) {
            var btn = document.createElement('button');
            var count = shapeCounts[shape];
            var selected = tempSelections[shape] ? tempSelections[shape].length : 0;
            btn.className = 'shape-btn' + (selected > 0 ? ' has-selection' : '');
            btn.innerHTML = shape + '<span class="count">' + count + ' items</span><span class="selected-badge">' + selected + ' selected</span>';
            btn.onclick = function() { selectShape(shape); };
            grid.appendChild(btn);
        });
        
        updateSelectedSummary();
    }
    
    function updateSelectedSummary() {
        var total = 0;
        var summary = document.getElementById('shapeSelections');
        summary.innerHTML = '';
        
        for(var shape in tempSelections) {
            var items = tempSelections[shape];
            if(items && items.length > 0) {
                total += items.length;
                var itemDetails = items.map(function(i) { 
                    return i.parcel + ' (' + i.carat + 'ct, ' + i.color + ', ' + i.clarity + ')'; 
                }).join(', ');
                summary.innerHTML += '<div><b>' + shape + '</b>: ' + items.length + ' items<br><span style="font-size:14px;color:#000;">' + itemDetails + '</span></div>';
            }
        }
        
        document.getElementById('selectedCount').innerText = total;
        document.getElementById('selectedSummary').style.display = total > 0 ? 'block' : 'none';
    }
    
    function openShapeSelectModal() {
        if(stockData.length === 0) { alert("Please import stock list first!"); return; }
        renderShapeGrid(getShapeCounts());
        document.getElementById('shapeModal').classList.add('active');
    }
    
    function getShapeCounts() {
        var counts = {};
        stockData.forEach(function(item) {
            counts[item.shape] = (counts[item.shape] || 0) + 1;
        });
        return counts;
    }
    
    function closeShapeModal() { document.getElementById('shapeModal').classList.remove('active'); }
    function closeItemsModal() { document.getElementById('itemsModal').classList.remove('active'); }
    
    function selectShape(shape) {
        currentShape = shape;
        document.getElementById('shapeModal').classList.remove('active');
        document.getElementById('itemsModalTitle').innerText = 'Select Items - ' + shape;
        document.getElementById('itemsModal').classList.add('active');
        document.getElementById('stockSearch').value = '';
        
        // Load previously selected for this shape
        if(!tempSelections[shape]) tempSelections[shape] = [];
        
        renderStockList();
    }
    
    function backToShapes() {
        document.getElementById('itemsModal').classList.remove('active');
        renderShapeGrid(getShapeCounts());
        document.getElementById('shapeModal').classList.add('active');
    }
    
    function renderStockList() {
        var list = document.getElementById('stockList');
        list.innerHTML = "";
        
        var searchQ = document.getElementById('stockSearch').value.toLowerCase();
        
        filteredStock = stockData.filter(function(item) {
            if(currentShape && item.shape !== currentShape) return false;
            if(searchQ) {
                return item.parcel.toLowerCase().indexOf(searchQ) >= 0 ||
                       item.carat.toLowerCase().indexOf(searchQ) >= 0 ||
                       item.color.toLowerCase().indexOf(searchQ) >= 0 ||
                       item.clarity.toLowerCase().indexOf(searchQ) >= 0 ||
                       item.cert.toLowerCase().indexOf(searchQ) >= 0;
            }
            return true;
        });
        
        document.getElementById('itemCount').innerText = filteredStock.length + ' items';
        
        var selectedItems = tempSelections[currentShape] || [];
        
        filteredStock.forEach(function(item, idx) {
            var div = document.createElement('div');
            var isSelected = selectedItems.some(function(s) { return s.parcel === item.parcel && s.carat === item.carat; });
            div.className = 'stock-item' + (isSelected ? ' selected' : '');
            div.dataset.idx = idx;
            div.onclick = function(e) { 
                if(e.target.type !== "checkbox") { 
                    var cb = this.querySelector('input[type="checkbox"]'); 
                    cb.checked = !cb.checked; 
                    this.classList.toggle('selected', cb.checked); 
                    toggleItemSelection(item, cb.checked);
                } 
            };
            
            div.innerHTML = '<input type="checkbox"' + (isSelected ? ' checked' : '') + '><div class="stock-item-info"><div><b>' + item.parcel + '</b> - ' + item.carat + 'ct ' + item.color + ' ' + item.clarity + (item.cert ? ' (' + item.cert + ')' : '') + '</div><div class="stock-label">Shape: ' + item.shape + '</div></div>';
            list.appendChild(div);
        });
    }
    
    function toggleItemSelection(item, selected) {
        if(!tempSelections[currentShape]) tempSelections[currentShape] = [];
        
        if(selected) {
            if(!tempSelections[currentShape].some(function(i) { return i.parcel === item.parcel && i.carat === item.carat; })) {
                tempSelections[currentShape].push(item);
            }
        } else {
            tempSelections[currentShape] = tempSelections[currentShape].filter(function(i) { return !(i.parcel === item.parcel && i.carat === item.carat); });
        }
    }
    
    function confirmShapeSelection() {
        // Stay in items modal but go back to shape selection
        backToShapes();
    }
    
    function filterStockItems() { renderStockList(); }
    
    function selectAll() { 
        document.querySelectorAll('.stock-item input').forEach(function(cb) { cb.checked = true; }); 
        document.querySelectorAll('.stock-item').forEach(function(div) { div.classList.add('selected'); });
        filteredStock.forEach(function(item) { toggleItemSelection(item, true); });
    }
    
    function deselectAll() { 
        document.querySelectorAll('.stock-item input').forEach(function(cb) { cb.checked = false; }); 
        document.querySelectorAll('.stock-item').forEach(function(div) { div.classList.remove('selected'); });
        tempSelections[currentShape] = [];
    }
    
    function submitAllSelections() {
        allSelections = [];
        for(var shape in tempSelections) {
            allSelections = allSelections.concat(tempSelections[shape]);
        }
        
        if(allSelections.length === 0) {
            alert("Please select at least one item!");
            return;
        }
        
        var tbody = document.getElementById("itemsBody");
        var startN = tbody.rows.length;
        
        allSelections.forEach(function(item, i) {
            addRow();
            var n = startN + i;
            document.getElementById("parcel"+n).value = item.parcel;
            document.getElementById("shape"+n).value = item.shape;
            document.getElementById("carat"+n).value = item.carat;
            document.getElementById("color"+n).value = item.color;
            document.getElementById("clarity"+n).value = item.clarity;
            document.getElementById("cert"+n).value = item.cert;
            calculate(n);
        });
        
        tempSelections = {};
        closeShapeModal();
    }
    
    function downloadPDF() {
        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("DN MEMORANDUM", 105, 20, { align: "center" });
        doc.setFontSize(10);
        doc.text("Certificate of Origin - USA Goods Returned", 105, 26, { align: "center" });
        
        var y = 40;
        doc.text("No:", 20, y); 
        var parcel1 = document.getElementById("parcel1");
        doc.text((parcel1 && parcel1.value) ? parcel1.value : "", 40, y);
        
        y = 50;
        doc.setFillColor(211,211,211); 
        doc.rect(20, y, 170, 8, "F");
        doc.rect(20, y, 170, 8, "S");
        
        doc.setFontSize(9);
        var cols = ["No", "Parcel", "Shape", "Carat", "Color", "Clarity", "Cert", "Price", "Disc%", "Amount"];
        var xs = [25, 40, 70, 100, 120, 140, 160, 175, 188, 200];
        for(var i=0; i<cols.length; i++) { doc.text(cols[i], xs[i], y+5, { align: "center" }); }
        y += 10;
        
        for(var i=1; i<=10; i++) {
            var caratEl = document.getElementById("carat"+i);
            if(caratEl && caratEl.value) {
                var el;
                doc.text(String(i), xs[0], y, { align: "center" });
                el = document.getElementById("parcel"+i); doc.text(el ? el.value : "", xs[1], y);
                el = document.getElementById("shape"+i); doc.text(el ? el.value : "", xs[2], y);
                el = document.getElementById("carat"+i); doc.text(el ? el.value : "", xs[3], y, { align: "center" });
                el = document.getElementById("color"+i); doc.text(el ? el.value : "", xs[4], y, { align: "center" });
                el = document.getElementById("clarity"+i); doc.text(el ? el.value : "", xs[5], y, { align: "center" });
                el = document.getElementById("cert"+i); doc.text(el ? el.value : "", xs[6], y);
                el = document.getElementById("price"+i); doc.text(el ? el.value : "", xs[7], y, { align: "center" });
                el = document.getElementById("disc"+i); doc.text(el ? el.value : "", xs[8], y, { align: "center" });
                el = document.getElementById("amount"+i); doc.text(el ? el.value : "", xs[9], y, { align: "center" });
                y += 7;
            }
        }
        
        y += 5;
        var totalAmt = document.getElementById("totalAmount");
        doc.text("Total:", 160, y);
        doc.text((totalAmt && totalAmt.value) ? totalAmt.value : "0", xs[9], y, { align: "center" });
        
        doc.save("dn_memorandum.pdf");
    }
    
    addRow();
    </script>
</body>
