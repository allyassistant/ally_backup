version: '1.1'
schema_version: '1.0'
resolution_order:
- minimax-portal
- kimi
- none
providers:
  minimax-portal:
    type: portal
    base_url: ${MINIMAX_PORTAL_URL}
    api_key: ${MINIMAX_PORTAL_KEY}
    timeout: 60
  kimi:
    type: noop
  none:
    type: noop
routes:
  fdq:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M2.7
      extra_body:
        reasoning: high
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
    health_check_interval: 60
    cost_weight: 0.2
  direct_answer:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M2.7
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
    cost_weight: 0.1
  sop:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M3
      extra_body:
        reasoning: high
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
  spawn:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M3
      extra_body:
        reasoning: high
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
    cost_weight: 0.5
  spawn_quality:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M3
      extra_body:
        reasoning: high
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
    cost_weight: 0.5
  code:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M3
      extra_body:
        reasoning: high
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
  browser:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M2.7
      extra_body:
        reasoning: high
      timeout: 90
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
  none:
    primary:
      provider: minimax-portal
      model: minimax-portal/MiniMax-M2.7
    fallback_chain:
    - kimi
    - none
    cooldown_seconds: 60
    cost_weight: 0.1
health_check:
  interval_seconds: 60
  failure_threshold: 3
  recovery_probe_interval: 30
  probe_method: list_models
  max_concurrent_probes: 3
logging:
  decision_log_path: scripts/router/decision_log.jsonl
  log_fields:
  - ts
  - route
  - suggestedModel
  - suggestedProvider
  - actualProvider
  - fallbackDepth
  - latencyMs
  - success
  - costEstimate
  - schemaVersion
