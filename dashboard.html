<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🩺 Health Monitor Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: #888;
      font-size: 0.9rem;
    }
    
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .status-badge {
      padding: 10px 20px;
      border-radius: 25px;
      font-weight: bold;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-ok { background: rgba(0, 200, 83, 0.2); border: 1px solid #00c853; color: #00c853; }
    .status-warning { background: rgba(255, 171, 0, 0.2); border: 1px solid #ffab00; color: #ffab00; }
    .status-critical { background: rgba(255, 61, 0, 0.2); border: 1px solid #ff3d00; color: #ff3d00; }
    .status-unknown { background: rgba(158, 158, 158, 0.2); border: 1px solid #9e9e9e; color: #9e9e9e; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .card-icon {
      font-size: 1.5rem;
    }
    
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .metric:last-child {
      border-bottom: none;
    }
    
    .metric-label {
      color: #888;
      font-size: 0.9rem;
    }
    
    .metric-value {
      font-weight: 600;
      font-size: 0.95rem;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .progress-green { background: linear-gradient(90deg, #00c853, #69f0ae); }
    .progress-yellow { background: linear-gradient(90deg, #ffab00, #ffd180); }
    .progress-red { background: linear-gradient(90deg, #ff3d00, #ff9e80); }
    
    .alert-indicator {
      font-size: 1.2rem;
    }
    
    .refresh-info {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-top: 20px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .error-message {
      background: rgba(255, 61, 0, 0.1);
      border: 1px solid #ff3d00;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #ff9e80;
    }
    
    .timestamp {
      font-family: 'Courier New', monospace;
      color: #00d4ff;
    }
    
    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: #666;
      font-size: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .footer a {
      color: #00d4ff;
      text-decoration: none;
    }
    
    /* 響應式設計 */
    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      .status-bar { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🩺 Health Monitor</h1>
      <p class="subtitle">OpenClaw 系統狀態監控儀表板</p>
    </header>
    
    <div class="status-bar" id="statusBar">
      <div class="status-badge status-unknown">
        <span>⏳</span>
        <span>Loading...</span>
      </div>
    </div>
    
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在獲取健康數據...</p>
      </div>
    </div>
    
    <div class="refresh-info">
      <p>⏱️ 自動刷新: <span id="countdown">60</span> 秒 | 最後更新: <span id="lastUpdate" class="timestamp">--</span></p>
    </div>
    
    <div class="footer">
      <p>Health Monitor Dashboard v1.0 | API: <a href="http://127.0.0.1:18790/health" target="_blank">http://127.0.0.1:18790/health</a></p>
      <p>運行 <code>node scripts/health_api.js</code> 啟動 API Server</p>
    </div>
  </div>

  <script>
    const API_URL = 'http://127.0.0.1:18790/health';
    const REFRESH_INTERVAL = 60; // 秒
    
    let countdown = REFRESH_INTERVAL;
    let countdownInterval;
    
    // 獲取健康數據
    async function fetchHealthData() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('API request failed');
        return await response.json();
      } catch (error) {
        console.error('Fetch error:', error);
        return { error: true, message: error.message };
      }
    }
    
    // 計算整體狀態
    function getOverallStatus(data) {
      if (data.error) return { status: 'ERROR', emoji: '❌', class: 'status-critical' };
      
      const statuses = [
        data.system?.status,
        data.disk?.status,
        data.errors?.status,
        data.cron?.status,
        data.gateway?.status,
        data.channels?.status
      ];
      
      if (statuses.includes('CRITICAL') || statuses.includes('error')) {
        return { status: 'CRITICAL', emoji: '🔴', class: 'status-critical' };
      }
      if (statuses.includes('WARNING')) {
        return { status: 'WARNING', emoji: '🟡', class: 'status-warning' };
      }
      return { status: 'HEALTHY', emoji: '🟢', class: 'status-ok' };
    }
    
    // 渲染狀態欄
    function renderStatusBar(data) {
      const overall = getOverallStatus(data);
      const statusBar = document.getElementById('statusBar');
      
      let html = `
        <div class="status-badge ${overall.class}">
          <span>${overall.emoji}</span>
          <span>System ${overall.status}</span>
        </div>
      `;
      
      if (!data.error) {
        html += `
          <div class="status-badge status-ok">
            <span>💻</span>
            <span>CPU ${data.system?.cpuIdle || '--'}% idle</span>
          </div>
          <div class="status-badge ${(data.system?.memPercent || 0) > 80 ? 'status-warning' : 'status-ok'}">
            <span>🧠</span>
            <span>Memory ${data.system?.memPercent || '--'}%</span>
          </div>
          <div class="status-badge ${data.gateway?.status === 'OK' ? 'status-ok' : 'status-critical'}">
            <span>🌐</span>
            <span>Gateway ${data.gateway?.status || '--'}</span>
          </div>
        `;
      }
      
      statusBar.innerHTML = html;
    }
    
    // 渲染進度條
    function renderProgress(value, thresholds = { warning: 70, critical: 85 }) {
      const percent = Math.min(Math.max(value, 0), 100);
      let colorClass = 'progress-green';
      if (percent >= thresholds.critical) colorClass = 'progress-red';
      else if (percent >= thresholds.warning) colorClass = 'progress-yellow';
      
      return `
        <div class="progress-bar">
          <div class="progress-fill ${colorClass}" style="width: ${percent}%"></div>
        </div>
      `;
    }
    
    // 渲染卡片
    function renderCard(title, icon, metrics, alert = '🟢') {
      let metricsHtml = metrics.map(m => `
        <div class="metric">
          <span class="metric-label">${m.label}</span>
          <span class="metric-value">${m.value}</span>
        </div>
        ${m.progress || ''}
      `).join('');
      
      return `
        <div class="card">
          <div class="card-header">
            <span class="card-icon">${icon}</span>
            <span>${title}</span>
            <span class="alert-indicator">${alert}</span>
          </div>
          ${metricsHtml}
        </div>
      `;
    }
    
    // 渲染儀表板
    function renderDashboard(data) {
      if (data.error) {
        document.getElementById('content').innerHTML = `
          <div class="error-message">
            <h3>❌ 無法連接 API Server</h3>
            <p>${data.message}</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">
              請確保已運行: <code>node scripts/health_api.js</code>
            </p>
          </div>
        `;
        return;
      }
      
      const grid = document.getElementById('content');
      
      const cards = [
        // System Card
        renderCard('System', '💻', [
          { label: 'CPU Idle', value: `${data.system?.cpuIdle || '--'}%` },
          { label: 'Load Average', value: data.system?.load || '--' },
          { label: 'Memory Used', value: `${data.system?.memUsedGB || '--'} / ${data.system?.memTotalGB || '--'} GB`,
            progress: renderProgress(data.system?.memPercent || 0, { warning: 80, critical: 90 }) },
          { label: 'Memory Free', value: `${data.system?.memFreeGB || '--'} GB` }
        ], data.system?.alert),
        
        // Disk Card
        renderCard('Disk', '💾', [
          { label: 'Usage', value: `${data.disk?.value || '--'}%`,
            progress: renderProgress(data.disk?.value || 0, { warning: 85, critical: 95 }) },
          { label: 'Available', value: data.disk?.available || '--' },
          { label: 'Total Size', value: data.disk?.size || '--' }
        ], data.disk?.alert),
        
        // Gateway Card
        renderCard('Gateway', '🌐', [
          { label: 'Status', value: data.gateway?.message || '--' },
          { label: 'PID', value: data.gateway?.pid || '--' }
        ], data.gateway?.alert),
        
        // Sessions Card
        renderCard('Sessions', '👥', [
          { label: 'Active Sessions', value: data.sessions?.count || 0 },
          { label: 'Default Model', value: data.model?.model || '--' }
        ], data.sessions?.alert),
        
        // Channels Card
        renderCard('Channels', '📡', [
          { label: 'WhatsApp', value: data.channels?.whatsapp?.ok ? '✅ OK' : `⚠️ ${data.channels?.whatsapp?.state || 'OFF'}` },
          { label: 'Discord', value: data.channels?.discord?.ok ? '✅ OK' : `⚠️ ${data.channels?.discord?.state || 'OFF'}` }
        ], data.channels?.alert),
        
        // Errors Card
        renderCard('Errors', '⚠️', [
          { label: 'Last Hour', value: `${data.errors?.count || 0} errors` },
          { label: 'Recent', value: (data.errors?.recent || []).join(', ') || 'None' }
        ], data.errors?.alert),
        
        // Cron Jobs Card
        renderCard('Cron Jobs', '⏰', [
          { label: 'Active Jobs', value: `${data.cron?.requiredFound || 0} / ${data.cron?.requiredTotal || 5}` },
          { label: 'Total Jobs', value: data.cron?.totalJobs || 0 },
          { label: 'Missing', value: (data.cron?.missingJobs || []).join(', ') || 'None' }
        ], data.cron?.alert),
        
        // Memory Files Card
        renderCard('Memory Files', '📝', [
          { label: 'Total Files', value: data.memoryFiles?.totalFiles || 0 },
          { label: 'Today Files', value: data.memoryFiles?.todayFiles || 0 },
          { label: 'Empty Files', value: data.memoryFiles?.emptyFiles || 0 },
          { label: 'Oversized', value: data.memoryFiles?.oversizedFiles || 0 }
        ], data.memoryFiles?.alert)
      ];
      
      grid.innerHTML = `<div class="grid">${cards.join('')}</div>`;
    }
    
    // 更新儀表板
    async function updateDashboard() {
      const data = await fetchHealthData();
      renderStatusBar(data);
      renderDashboard(data);
      
      document.getElementById('lastUpdate').textContent = data.time || new Date().toLocaleString('zh-HK');
      countdown = REFRESH_INTERVAL;
    }
    
    // 倒數計時
    function startCountdown() {
      countdownInterval = setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = countdown;
        
        if (countdown <= 0) {
          updateDashboard();
        }
      }, 1000);
    }
    
    // 初始化
    async function init() {
      await updateDashboard();
      startCountdown();
    }
    
    // 頁面加載完成後初始化
    document.addEventListener('DOMContentLoaded', init);
    
    // 頁面可見性變化時處理
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        updateDashboard();
      }
    });
  </script>
</body>
</html>
